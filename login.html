<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teddy's Gas Station - Login 🔐</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(160deg, #001a4d 0%, #003d99 50%, #0066cc 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

/* Animated bubbles */
.bubble {
  position: fixed;
  border-radius: 50%;
  background: rgba(255,215,0,0.1);
  border: 2px solid rgba(255,215,0,0.2);
  animation: float 15s infinite;
  pointer-events: none;
}

@keyframes float {
  0% { transform: translateY(100vh) translateX(0); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.3; }
  100% { transform: translateY(-100px) translateX(100px); opacity: 0; }
}

/* Animated road */
.road {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: linear-gradient(90deg, #333 25%, transparent 25%, transparent 50%, #333 50%, #333 75%, transparent 75%, transparent);
  background-size: 40px 40px;
  background-position: 0 0;
  animation: moveRoad 2s linear infinite;
  opacity: 0.3;
  z-index: 1;
}

@keyframes moveRoad {
  0% { background-position: 0 0; }
  100% { background-position: 40px 0; }
}

/* Logo watermark */
.logo-watermark {
  position: fixed;
  bottom: 20px;
  right: 20px;
  font-size: 80px;
  opacity: 0.1;
  animation: pulse 3s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}

@keyframes pulse {
  0%, 100% { opacity: 0.08; }
  50% { opacity: 0.15; }
}

/* Ad banner */
.ad-banner {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.8);
  border: 3px solid #FFD700;
  border-radius: 16px;
  padding: 20px;
  width: 200px;
  text-align: center;
  z-index: 100;
  backdrop-filter: blur(10px);
}

.ad-title {
  font-family: 'Bangers', cursive;
  font-size: 18px;
  color: #FFD700;
  letter-spacing: 2px;
  margin-bottom: 12px;
}

.ad-info {
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  font-weight: 800;
  line-height: 1.8;
}

.ad-phone {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 2px solid #FFD700;
  color: #FFD700;
  font-family: 'Bangers', cursive;
  font-size: 14px;
}

/* Main container */
.container {
  background: rgba(0,0,0,0.7);
  border: 4px solid #FFD700;
  border-radius: 24px;
  padding: 40px;
  width: 100%;
  max-width: 450px;
  z-index: 10;
  backdrop-filter: blur(10px);
  position: relative;
}

.title {
  font-family: 'Bangers', cursive;
  font-size: 36px;
  color: #FFD700;
  text-align: center;
  letter-spacing: 3px;
  margin-bottom: 8px;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
}

.subtitle {
  text-align: center;
  color: rgba(255,255,255,0.6);
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 24px;
}

/* Tabs */
.tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 24px;
}

.tab-btn {
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.3);
  color: rgba(255,255,255,0.6);
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'Bangers', cursive;
  font-size: 16px;
  letter-spacing: 2px;
  transition: all 0.3s;
  font-weight: 800;
}

.tab-btn.active {
  background: #FFD700;
  color: #333;
  border-color: #FFD700;
  box-shadow: 0 0 20px rgba(255,215,0,0.5);
}

.tab-btn:hover {
  transform: translateY(-2px);
}

/* Form */
.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
  animation: fadeIn 0.3s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.form-group {
  margin-bottom: 16px;
}

label {
  display: block;
  color: rgba(255,255,255,0.8);
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

input {
  width: 100%;
  padding: 12px;
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 8px;
  background: rgba(255,255,255,0.1);
  color: white;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  transition: all 0.3s;
}

input:focus {
  outline: none;
  border-color: #FFD700;
  box-shadow: 0 0 10px rgba(255,215,0,0.3);
  background: rgba(255,255,255,0.15);
}

input::placeholder {
  color: rgba(255,255,255,0.4);
}

/* Password strength */
.strength-bar {
  height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  margin-top: 6px;
  overflow: hidden;
}

.strength-fill {
  height: 100%;
  width: 0%;
  transition: all 0.3s;
  border-radius: 2px;
}

.strength-weak { background: #FF6347; }
.strength-medium { background: #FFA500; }
.strength-strong { background: #00AA00; }

/* Buttons */
.submit-btn {
  width: 100%;
  padding: 14px;
  background: #FFD700;
  color: #333;
  border: 3px solid #8B6914;
  border-radius: 10px;
  font-family: 'Bangers', cursive;
  font-size: 18px;
  letter-spacing: 2px;
  cursor: pointer;
  font-weight: 900;
  box-shadow: 0 6px 0 #8B6914;
  transition: transform 0.15s;
  margin-top: 16px;
}

.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 0 #8B6914;
}

.submit-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Messages */
.message {
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 16px;
  font-weight: 800;
  text-align: center;
  display: none;
}

.message.show {
  display: block;
  animation: slideIn 0.3s ease-out;
}

@keyframes slideIn {
  from { transform: translateY(-10px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.message.success {
  background: rgba(0,170,0,0.3);
  color: #00AA00;
  border: 2px solid #00AA00;
}

.message.error {
  background: rgba(255,99,71,0.3);
  color: #FF6347;
  border: 2px solid #FF6347;
}

.message.info {
  background: rgba(100,149,237,0.3);
  color: #6495ED;
  border: 2px solid #6495ED;
}

/* Back link */
.back-link {
  text-align: center;
  margin-top: 20px;
}

.back-link a {
  color: rgba(255,255,255,0.6);
  text-decoration: none;
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: color 0.3s;
}

.back-link a:hover {
  color: #FFD700;
}

.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top-color: #FFD700;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="road"></div>
<div class="logo-watermark">⛽</div>

<div class="ad-banner">
  <div class="ad-title">🏪 TEDDY'S</div>
  <div class="ad-info">
    Open 24/7<br>
    Fuel • Snacks<br>
    Drinks • Gas<br>
    Service
  </div>
  <div class="ad-phone">📞 (832) 224-5918</div>
</div>

<div class="container">
  <div class="title">🔐 LOGIN</div>
  <div class="subtitle">Teddy's Gas Station</div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('employee')">👷 EMPLOYEE</button>
    <button class="tab-btn" onclick="switchTab('customer')">🛒 CUSTOMER</button>
  </div>

  <!-- EMPLOYEE TAB -->
  <div class="tab-content active" id="employee-tab">
    <div id="employeeMessage" class="message"></div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="empUsername" placeholder="Enter username">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="empPassword" placeholder="Enter password">
    </div>

    <button class="submit-btn" onclick="employeeSignIn()">SIGN IN</button>
  </div>

  <!-- CUSTOMER TAB -->
  <div class="tab-content" id="customer-tab">
    <div id="customerMessage" class="message"></div>

    <!-- SIGN IN FORM -->
    <div id="signInForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="custEmail" placeholder="your@email.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="custPassword" placeholder="Enter password">
      </div>

      <button class="submit-btn" onclick="customerSignIn()">SIGN IN</button>

      <div style="text-align: center; margin-top: 16px; color: rgba(255,255,255,0.6); font-size: 13px; font-weight: 800;">
        Don't have an account?
        <a href="#" onclick="showSignUp()" style="color: #FFD700; text-decoration: none;">CREATE ONE</a>
      </div>
    </div>

    <!-- SIGN UP FORM (hidden) -->
    <div id="signUpForm" style="display: none;">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="your@email.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Min 8 characters">
        <div class="strength-bar">
          <div class="strength-fill" id="strengthFill"></div>
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Re-enter password">
      </div>

      <button class="submit-btn" onclick="customerSignUp()">CREATE ACCOUNT</button>

      <div style="text-align: center; margin-top: 16px; color: rgba(255,255,255,0.6); font-size: 13px; font-weight: 800;">
        Already have an account?
        <a href="#" onclick="showSignIn()" style="color: #FFD700; text-decoration: none;">SIGN IN</a>
      </div>
    </div>
  </div>

  <div class="back-link">
    <a href="index.html">← Back to Teddy's Website</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// Supabase setup
const SUPABASE_URL = 'https://mzfdgzwdnvntefgnlnoi.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16ZmRnendkbnZudGVmZ25sbm9pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzODAxMzYsImV4cCI6MjA5MTk1NjEzNn0.IuYLD1R4Wr8bAOvVSIO2KdqXPYVw2f77bxMUty7pQ7c';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Create bubbles
function createBubbles() {
  for(var i = 0; i < 15; i++) {
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    var size = Math.random() * 60 + 20;
    bubble.style.width = size + 'px';
    bubble.style.height = size + 'px';
    bubble.style.left = Math.random() * 100 + '%';
    bubble.style.bottom = '-100px';
    bubble.style.animationDuration = (Math.random() * 8 + 5) + 's';
    bubble.style.animationDelay = Math.random() * 10 + 's';
    document.body.appendChild(bubble);
  }
}

createBubbles();

// Tab switching
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  
  if(tab === 'employee') {
    document.querySelectorAll('.tab-btn')[0].classList.add('active');
    document.getElementById('employee-tab').classList.add('active');
  } else {
    document.querySelectorAll('.tab-btn')[1].classList.add('active');
    document.getElementById('customer-tab').classList.add('active');
  }
}

function showSignUp() {
  document.getElementById('signInForm').style.display = 'none';
  document.getElementById('signUpForm').style.display = 'block';
  clearMessage('customerMessage');
}

function showSignIn() {
  document.getElementById('signUpForm').style.display = 'none';
  document.getElementById('signInForm').style.display = 'block';
  clearMessage('customerMessage');
}

// Messages
function showMessage(elementId, text, type) {
  var msg = document.getElementById(elementId);
  msg.textContent = text;
  msg.className = 'message show ' + type;
}

function clearMessage(elementId) {
  var msg = document.getElementById(elementId);
  msg.className = 'message';
}

// Password strength
document.getElementById('signupPassword')?.addEventListener('input', function() {
  var strength = 0;
  var val = this.value;
  if(val.length >= 8) strength++;
  if(/[A-Z]/.test(val)) strength++;
  if(/[0-9]/.test(val)) strength++;
  if(/[^a-zA-Z0-9]/.test(val)) strength++;
  
  var fill = document.getElementById('strengthFill');
  var width = (strength / 4) * 100;
  fill.style.width = width + '%';
  
  if(strength <= 1) fill.className = 'strength-fill strength-weak';
  else if(strength <= 2) fill.className = 'strength-fill strength-medium';
  else fill.className = 'strength-fill strength-strong';
});

// EMPLOYEE SIGN IN
async function employeeSignIn() {
  var username = document.getElementById('empUsername').value;
  var password = document.getElementById('empPassword').value;
  
  if(!username || !password) {
    showMessage('employeeMessage', '⚠️ Enter username & password', 'error');
    return;
  }
  
  try {
    // Query employees table
    var { data, error } = await supabase
      .from('employees')
      .select('*')
      .eq('username', username)
      .eq('password', password)
      .single();
    
    if(error || !data) {
      showMessage('employeeMessage', '❌ Username or password incorrect', 'error');
      return;
    }
    
    // Success
    localStorage.setItem('teddys_loggedin', 'employee');
    localStorage.setItem('employee_name', data.full_name);
    showMessage('employeeMessage', '✅ Logging in...', 'success');
    setTimeout(() => window.location.href = 'index.html', 1000);
    
  } catch(e) {
    showMessage('employeeMessage', '❌ Error: ' + e.message, 'error');
  }
}

// CUSTOMER SIGN IN
async function customerSignIn() {
  var email = document.getElementById('custEmail').value;
  var password = document.getElementById('custPassword').value;
  
  if(!email || !password) {
    showMessage('customerMessage', '⚠️ Enter email & password', 'error');
    return;
  }
  
  try {
    var { data, error } = await supabase.auth.signInWithPassword({
      email: email,
      password: password
    });
    
    if(error) {
      showMessage('customerMessage', '❌ ' + error.message, 'error');
      return;
    }
    
    localStorage.setItem('teddys_loggedin', 'customer');
    showMessage('customerMessage', '✅ Logging in...', 'success');
    setTimeout(() => window.location.href = 'index.html', 1000);
    
  } catch(e) {
    showMessage('customerMessage', '❌ Error: ' + e.message, 'error');
  }
}

// CUSTOMER SIGN UP
async function customerSignUp() {
  var email = document.getElementById('signupEmail').value;
  var password = document.getElementById('signupPassword').value;
  var confirm = document.getElementById('confirmPassword').value;
  
  if(!email || !password || !confirm) {
    showMessage('customerMessage', '⚠️ Fill all fields', 'error');
    return;
  }
  
  if(password !== confirm) {
    showMessage('customerMessage', '⚠️ Passwords don\'t match', 'error');
    return;
  }
  
  if(password.length < 8) {
    showMessage('customerMessage', '⚠️ Password must be 8+ characters', 'error');
    return;
  }
  
  try {
    // Check if email exists
    var { data: existing } = await supabase
      .from('users')
      .select('*')
      .eq('email', email)
      .single();
    
    if(existing) {
      showMessage('customerMessage', '❌ Email already exists!', 'error');
      return;
    }
    
    // Create auth account
    var { data, error } = await supabase.auth.signUp({
      email: email,
      password: password,
      options: {
        emailRedirectTo: window.location.origin + '/login.html?verified=true'
      }
    });
    
    if(error) {
      showMessage('customerMessage', '❌ ' + error.message, 'error');
      return;
    }
    
    // Save to users table
    await supabase.from('users').insert([{
      id: data.user.id,
      email: email,
      created_at: new Date(),
      verified: false
    }]);
    
    showMessage('customerMessage', '✅ Account created! Check your email to verify.', 'success');
    setTimeout(() => showSignIn(), 2000);
    
  } catch(e) {
    showMessage('customerMessage', '❌ Error: ' + e.message, 'error');
  }
}
</script>
</body>
</html>
