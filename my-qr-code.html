<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Rewards QR Code - Teddy's</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  max-width: 500px;
  width: 100%;
}

.card {
  background: white;
  border-radius: 24px;
  padding: 40px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

.logo {
  font-size: 60px;
  margin-bottom: 10px;
}

.title {
  font-family: 'Bangers', cursive;
  font-size: 32px;
  color: #1e3a8a;
  letter-spacing: 3px;
  margin-bottom: 10px;
}

.subtitle {
  color: #64748b;
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 30px;
}

#qrcode {
  display: inline-block;
  padding: 20px;
  background: white;
  border-radius: 16px;
  border: 4px solid #FFD700;
  margin-bottom: 20px;
}

.email-display {
  font-size: 16px;
  font-weight: 800;
  color: #1e3a8a;
  margin-bottom: 30px;
  word-break: break-all;
}

.instruction {
  background: #f1f5f9;
  border-radius: 12px;
  padding: 20px;
  font-size: 14px;
  color: #475569;
  font-weight: 600;
  line-height: 1.6;
}

.instruction strong {
  color: #1e3a8a;
}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="logo">🐻⭐</div>
    <div class="title">MY REWARDS QR</div>
    <div class="subtitle">Show this at checkout to earn points!</div>
    
    <div id="qrcode"></div>
    
    <div class="email-display" id="emailDisplay">Loading...</div>
    
    <div class="instruction">
      <strong>📱 How to use:</strong><br>
      Show this QR code to the cashier at Teddy's Gas Station when you checkout. They'll scan it and you'll automatically earn points!<br><br>
      <strong>💰 Earn 1 point per $1 spent</strong><br>
      <strong>🎁 100 points = $1 off anything!</strong>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
// Get customer email from login
var customerEmail = localStorage.getItem('customer_email');

if(!customerEmail) {
  // If no email, ask for it
  customerEmail = prompt('Enter your email to create your Rewards QR code:');
  if(customerEmail) {
    localStorage.setItem('customer_email', customerEmail);
  }
}

if(customerEmail) {
  // Display email
  document.getElementById('emailDisplay').textContent = customerEmail;
  
  // Generate QR code with email
  new QRCode(document.getElementById("qrcode"), {
    text: customerEmail,
    width: 256,
    height: 256,
    colorDark: "#000000",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });
} else {
  document.getElementById('emailDisplay').textContent = 'No email found. Please log in first!';
}
</script>

</body>
</html>
