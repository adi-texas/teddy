<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Teddy's Gas Station</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #CC2222; --red-dark: #8B1010;
  --navy: #1A3070; --navy-dark: #0D1C45;
  --gold: #F5B800; --gold-dark: #c49000;
}
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(160deg, #070F25 0%, #0D1C45 60%, #1a2a5a 100%);
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px; overflow-x: hidden;
}
.sunburst {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 900px; height: 900px;
  background: repeating-conic-gradient(rgba(245,184,0,0.06) 0deg 9deg, transparent 9deg 18deg);
  border-radius: 50%; pointer-events: none; z-index: 0;
}
.logo-wrap { position: relative; z-index: 2; margin-bottom: 8px; }
.logo-wrap img { width: 130px; filter: drop-shadow(0 0 30px rgba(245,184,0,0.4)); }
.box {
  position: relative; z-index: 2;
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(255,255,255,0.12);
  border-radius: 28px; padding: 40px 44px;
  width: 100%; max-width: 460px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.4);
}
.box-title { font-family:'Bangers',cursive; font-size:36px; color:var(--gold); letter-spacing:3px; text-align:center; margin-bottom:4px; }
.box-sub { text-align:center; color:rgba(255,255,255,0.4); font-size:12px; font-weight:800; margin-bottom:28px; text-transform:uppercase; letter-spacing:2px; }
.role-tabs { display:flex; gap:6px; margin-bottom:24px; background:rgba(0,0,0,0.2); border-radius:12px; padding:5px; }
.role-tab { flex:1; background:transparent; border:none; border-radius:9px; padding:9px 4px; cursor:pointer; font-family:'Bangers',cursive; font-size:14px; letter-spacing:1px; color:rgba(255,255,255,0.4); transition:all 0.2s; }
.role-tab.active { background:var(--gold); color:var(--navy-dark); }
.role-tab:hover:not(.active) { color:var(--gold); }

/* Two step overlay */
.step-overlay {
  position:fixed; inset:0; z-index:9999;
  background:rgba(0,0,0,0.85);
  display:none; align-items:center; justify-content:center;
  padding:24px;
}
.step-box {
  background: linear-gradient(160deg, #0D1C45, #1A3070);
  border:2px solid rgba(245,184,0,0.4);
  border-radius:24px; padding:40px 44px;
  width:100%; max-width:400px; text-align:center;
}
.step-icon { font-size:56px; margin-bottom:16px; }
.step-title { font-family:'Bangers',cursive; font-size:30px; color:var(--gold); letter-spacing:3px; margin-bottom:8px; }
.step-sub { color:rgba(255,255,255,0.5); font-size:13px; font-weight:800; margin-bottom:24px; text-transform:uppercase; letter-spacing:1px; }

.form-group { margin-bottom:16px; text-align:left; }
label { display:block; font-size:11px; font-weight:800; color:rgba(255,255,255,0.45); text-transform:uppercase; letter-spacing:1px; margin-bottom:7px; }
input[type=text], input[type=password], input[type=email] {
  width:100%; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.14);
  border-radius:12px; padding:13px 16px; font-family:'Nunito',sans-serif;
  font-size:15px; font-weight:700; color:white; outline:none; transition:border-color 0.2s;
}
input::placeholder { color:rgba(255,255,255,0.22); }
input:focus { border-color:var(--gold); }
.pass-wrap { position:relative; }
.pass-wrap input { padding-right:50px; }
.eye-btn { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:18px; color:rgba(255,255,255,0.4); }
.eye-btn:hover { color:var(--gold); }
.remember-row { display:flex; align-items:center; gap:10px; margin-bottom:20px; cursor:pointer; }
.remember-row input[type=checkbox] { width:18px; height:18px; accent-color:var(--gold); cursor:pointer; }
.remember-row span { font-size:13px; font-weight:800; color:rgba(255,255,255,0.5); }
.mode-toggle { display:flex; background:rgba(0,0,0,0.25); border-radius:12px; padding:5px; margin-bottom:24px; }
.mode-btn { flex:1; background:transparent; border:none; border-radius:9px; padding:10px; cursor:pointer; font-family:'Bangers',cursive; font-size:15px; letter-spacing:1px; color:rgba(255,255,255,0.4); transition:all 0.2s; }
.mode-btn.active { background:var(--navy); color:var(--gold); }
.strength-bar { height:4px; border-radius:2px; background:rgba(255,255,255,0.1); margin-top:6px; overflow:hidden; }
.strength-fill { height:100%; width:0%; border-radius:2px; transition:width 0.3s,background 0.3s; }
.btn { width:100%; background:var(--red); color:white; font-family:'Bangers',cursive; font-size:22px; letter-spacing:3px; padding:15px; border:none; border-radius:14px; cursor:pointer; box-shadow:0 6px 0 var(--red-dark); transition:transform 0.15s,box-shadow 0.15s; margin-top:4px; }
.btn:hover { transform:translateY(-2px); box-shadow:0 8px 0 var(--red-dark); }
.btn-gold { background:var(--gold); color:var(--navy-dark); box-shadow:0 6px 0 var(--gold-dark); }
.btn-gold:hover { box-shadow:0 8px 0 var(--gold-dark); }
.btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
.msg { display:none; border-radius:10px; padding:12px 16px; font-size:13px; font-weight:800; text-align:center; margin-bottom:14px; }
.msg.error { background:rgba(204,34,34,0.15); border:1px solid rgba(204,34,34,0.4); color:#ff8888; }
.msg.success { background:rgba(0,180,0,0.12); border:1px solid rgba(0,200,0,0.3); color:#88ffaa; }
.back-link { display:block; text-align:center; margin-top:18px; color:rgba(255,255,255,0.3); font-size:12px; font-weight:800; text-decoration:none; letter-spacing:1px; position:relative; z-index:2; }
.back-link:hover { color:var(--gold); }
.success-screen { display:none; text-align:center; }
.suc-icon { font-size:68px; margin-bottom:14px; }
.suc-title { font-family:'Bangers',cursive; font-size:38px; color:var(--gold); letter-spacing:3px; margin-bottom:6px; }
.suc-sub { color:rgba(255,255,255,0.55); font-size:15px; font-weight:700; margin-bottom:24px; }
.go-btn { display:inline-block; background:var(--gold); color:var(--navy-dark); font-family:'Bangers',cursive; font-size:20px; letter-spacing:2px; padding:13px 36px; border-radius:50px; text-decoration:none; border:3px solid var(--gold-dark); box-shadow:0 5px 0 var(--gold-dark); }
.loading { display:inline-block; width:18px; height:18px; border:3px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.8s linear infinite; vertical-align:middle; margin-right:8px; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="sunburst"></div>

<!-- TWO STEP VERIFICATION OVERLAY (Employee only) -->
<div class="step-overlay" id="step-overlay">
  <div class="step-box">
    <div class="step-icon">🔒</div>
    <div class="step-title">EMPLOYEE ACCESS</div>
    <p class="step-sub">Enter the staff access code</p>
    <div class="msg error" id="step-error"></div>
    <div class="form-group">
      <label>Staff Access Code</label>
      <div class="pass-wrap">
        <input type="password" id="step-code" placeholder="Enter staff code">
        <button type="button" class="eye-btn" onclick="togglePass('step-code',this)">👁️</button>
      </div>
    </div>
    <button class="btn" onclick="verifyStaffCode()" style="margin-top:8px;">✅ VERIFY</button>
    <button onclick="cancelStepVerify()" style="background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:13px;font-weight:800;margin-top:14px;display:block;width:100%;text-align:center;">Cancel</button>
  </div>
</div>

  staffVerified = false;
  document.querySelectorAll(".role-tab").forEach(function(b){ b.classList.remove("active"); });
  btn.classList.add("active");

  if(role === "employee") {
    document.getElementById("mode-toggle").style.display = "none";
    document.getElementById("grp-username").style.display = "";
    document.getElementById("grp-email").style.display = "none";
    document.getElementById("grp-name").style.display = "none";
    document.getElementById("grp-confirm").style.display = "none";
    document.getElementById("strength-bar").style.display = "none";
    document.getElementById("lbl-user").textContent = "Username";
    document.getElementById("inp-username").placeholder = "Enter your username";
    document.getElementById("main-btn").textContent = "🔐 SIGN IN";
    document.getElementById("main-btn").className = "btn";
    document.getElementById("box-sub").textContent = "Employee Portal";
    // Step overlay only shown after password check
  } else {
    document.getElementById("mode-toggle").style.display = "flex";
    document.getElementById("grp-username").style.display = "none";
    document.getElementById("grp-email").style.display = "";
    document.getElementById("box-sub").textContent = "Customer Account";
    setMode("signin", document.querySelector(".mode-btn"));
  }
}

// ── TWO STEP ──
function verifyStaffCode() {
  var code = document.getElementById("step-code").value.trim();
  var errEl = document.getElementById("step-error");
  if(code === STAFF_CODE) {
    staffVerified = true;
    document.getElementById("step-overlay").style.display = "none";
    // Complete the login
    var emp = window._pendingEmployee;
    if(emp) {
      if(emp.remember) localStorage.setItem("teddys_emp_user", emp.username);
      else localStorage.removeItem("teddys_emp_user");
      showSuccess("employee", emp.name);
      window._pendingEmployee = null;
    }
  } else {
    errEl.textContent = "❌ Incorrect staff code! Please try again.";
    errEl.style.display = "block";
    document.getElementById("step-code").value = "";
  }
}

function cancelStepVerify() {
  document.getElementById("step-overlay").style.display = "none";
  // Go back to customer tab
  setRole("customer", document.getElementById("tab-customer"));
  document.getElementById("tab-customer").classList.add("active");
  document.getElementById("tab-employee").classList.remove("active");
}

// ── MODE SWITCH (customer only) ──
function setMode(mode, btn) {
  currentMode = mode;
  clearMsg();
  document.querySelectorAll(".mode-btn").forEach(function(b){ b.classList.remove("active"); });
  if(btn) btn.classList.add("active");
  var isCreate = mode === "create";
  document.getElementById("grp-name").style.display    = isCreate ? "" : "none";
  document.getElementById("grp-confirm").style.display = isCreate ? "" : "none";
  document.getElementById("strength-bar").style.display = isCreate ? "" : "none";
  document.getElementById("main-btn").textContent = isCreate ? "✨ CREATE ACCOUNT" : "🔐 SIGN IN";
  document.getElementById("main-btn").className   = isCreate ? "btn btn-gold" : "btn";
}

function clearMsg() {
  document.getElementById("msg-error").style.display = "none";
  document.getElementById("msg-success").style.display = "none";
}
function showMsg(type, txt) {
  clearMsg();
  var el = document.getElementById(type === "error" ? "msg-error" : "msg-success");
  el.textContent = txt; el.style.display = "block";
}

function togglePass(id, btn) {
  var inp = document.getElementById(id);
  inp.type = inp.type === "password" ? "text" : "password";
  btn.textContent = inp.type === "password" ? "👁️" : "🙈";
}

function checkStrength(val) {
  var fill = document.getElementById("strength-fill");
  var pct = 0; var color = "#ff4444";
  if(val.length>=4){ pct=25; color="#ff8800"; }
  if(val.length>=7){ pct=55; color="#ffcc00"; }
  if(val.length>=9 && /[0-9]/.test(val)){ pct=80; color="#88cc00"; }
  if(val.length>=10 && /[0-9]/.test(val) && /[A-Z]/.test(val)){ pct=100; color="#00cc66"; }
  fill.style.width = pct+"%"; fill.style.background = color;
}

function setLoading(on) {
  var btn = document.getElementById("main-btn");
  btn.disabled = on;
  if(on) btn.innerHTML = '<span class="loading"></span> PLEASE WAIT...';
  else {
    if(currentRole === "employee") btn.textContent = "🔐 SIGN IN";
    else btn.textContent = currentMode === "create" ? "✨ CREATE ACCOUNT" : "🔐 SIGN IN";
  }
}

function showSuccess(role, name) {
  document.getElementById("main-screen").style.display = "none";
  document.getElementById("success-screen").style.display = "block";
  localStorage.setItem("teddys_loggedin", role);

  if(role === "employee") {
    document.getElementById("suc-icon").textContent = "🎉🎊🎉";
    document.getElementById("suc-title").innerHTML = 
      "<span style='font-size:28px;color:white;display:block;margin-bottom:4px;font-family:Bangers,cursive;letter-spacing:3px;'>WELCOME!!!</span>" +
      "<span style='font-size:clamp(28px,7vw,52px);color:var(--gold);display:block;'>" + name + "!</span>";
    document.getElementById("suc-sub").innerHTML = 
      "<span style='color:rgba(255,255,255,0.6);'>Great to see you at Teddy\'s Gas Station today! 🐻⛽</span>";
    document.getElementById("go-btn").style.display = "block";
    document.getElementById("crew-btn").style.display = "block";
  } else {
    document.getElementById("suc-icon").textContent = "🛒🎉";
    document.getElementById("suc-title").textContent = "WELCOME BACK!";
    document.getElementById("suc-sub").textContent = "Logged in as Customer — " + name;
    document.getElementById("go-btn").style.display = "block";
    document.getElementById("crew-btn").style.display = "none";
  }
}

// ── MAIN LOGIN ──
async function handleAction() {
  clearMsg();
  var pass = document.getElementById("inp-pass").value;
  var remember = document.getElementById("chk-remember").checked;

  if(!pass){ showMsg("error","Please enter your password!"); return; }

  setLoading(true);

  try {
    if(currentRole === "employee") {
      var username = document.getElementById("inp-username").value.trim();
      if(!username){ showMsg("error","Please enter your username!"); setLoading(false); return; }

      // Look up employee in employees table by username + password
      var res = await sb
        .from("employees")
        .select("*")
        .eq("username", username)
        .eq("password", pass)
        .eq("active", true)
        .single();

      if(res.error || !res.data) {
        showMsg("error","Incorrect username or password! Please check with your manager.");
        setLoading(false); return;
      }

      // Password correct! Now show the staff code verification
      setLoading(false);
      window._pendingEmployee = { name: res.data.full_name || username, remember: remember, username: username };
      document.getElementById("step-code").value = "";
      document.getElementById("step-error").style.display = "none";
      document.getElementById("step-overlay").style.display = "flex";

    } else {
      // Customer — Supabase Auth
      var email = document.getElementById("inp-email").value.trim();
      if(!email){ showMsg("error","Please enter your email!"); setLoading(false); return; }

      if(currentMode === "create") {
        var name    = document.getElementById("inp-name").value.trim();
        var confirm = document.getElementById("inp-confirm").value;
        if(pass !== confirm){ showMsg("error","Passwords do not match!"); setLoading(false); return; }
        if(pass.length < 6){ showMsg("error","Password must be at least 6 characters!"); setLoading(false); return; }

        var res = await sb.auth.signUp({ email:email, password:pass, options:{ data:{ full_name:name, role:"customer" } } });
        if(res.error){ showMsg("error", res.error.message); setLoading(false); return; }
        showMsg("success","Account created! Check your email to confirm, then sign in.");
        setLoading(false); return;

      } else {
        var res = await sb.auth.signInWithPassword({ email:email, password:pass });
        if(res.error){ showMsg("error", res.error.message); setLoading(false); return; }

        // Make sure it's a customer not an employee trying to sneak in
        var userRole = res.data.user.user_metadata && res.data.user.user_metadata.role;
        if(userRole && userRole !== "customer") {
          await sb.auth.signOut();
          showMsg("error","This is not a customer account! Please use the Employee tab.");
          setLoading(false); return;
        }

        if(remember) localStorage.setItem("teddys_email", email);
        else localStorage.removeItem("teddys_email");

        showSuccess("customer", email);
      }
    }
  } catch(err) {
    showMsg("error","Something went wrong. Please try again.");
    setLoading(false);
  }
}

// Auto fill remembered
var savedEmp = localStorage.getItem("teddys_emp_user");
if(savedEmp) document.getElementById("inp-username").value = savedEmp;
var savedEmail = localStorage.getItem("teddys_email");
if(savedEmail) { document.getElementById("inp-email").value = savedEmail; document.getElementById("chk-remember").checked = true; }

document.addEventListener("keydown", function(e){ if(e.key==="Enter") handleAction(); });
</script>
