<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teddy's Gas Station - Login 🔐</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(160deg, #001a4d 0%, #003d99 50%, #0066cc 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

.road {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: linear-gradient(90deg, #333 25%, transparent 25%, transparent 50%, #333 50%, #333 75%, transparent 75%, transparent);
  background-size: 40px 40px;
  animation: moveRoad 2s linear infinite;
  opacity: 0.3;
  z-index: 1;
}

@keyframes moveRoad {
  0% { background-position: 0 0; }
  100% { background-position: 40px 0; }
}

.logo-watermark {
  position: fixed;
  bottom: 20px;
  right: 20px;
  font-size: 80px;
  opacity: 0.1;
  animation: pulse 3s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}

@keyframes pulse {
  0%, 100% { opacity: 0.08; }
  50% { opacity: 0.15; }
}

.ad-banner {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.8);
  border: 3px solid #FFD700;
  border-radius: 16px;
  padding: 20px;
  width: 200px;
  text-align: center;
  z-index: 100;
  backdrop-filter: blur(10px);
}

.ad-title {
  font-family: 'Bangers', cursive;
  font-size: 18px;
  color: #FFD700;
  letter-spacing: 2px;
  margin-bottom: 12px;
}

.ad-info {
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  font-weight: 800;
  line-height: 1.8;
}

.ad-phone {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 2px solid #FFD700;
  color: #FFD700;
  font-family: 'Bangers', cursive;
  font-size: 14px;
}

.container {
  background: rgba(0,0,0,0.7);
  border: 4px solid #FFD700;
  border-radius: 24px;
  padding: 40px;
  width: 100%;
  max-width: 450px;
  z-index: 10;
  backdrop-filter: blur(10px);
  position: relative;
}

.title {
  font-family: 'Bangers', cursive;
  font-size: 36px;
  color: #FFD700;
  text-align: center;
  letter-spacing: 3px;
  margin-bottom: 8px;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
}

.subtitle {
  text-align: center;
  color: rgba(255,255,255,0.6);
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 24px;
}

.tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 24px;
}

.tab-btn {
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.3);
  color: rgba(255,255,255,0.6);
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'Bangers', cursive;
  font-size: 16px;
  letter-spacing: 2px;
  transition: all 0.3s;
  font-weight: 800;
}

.tab-btn.active {
  background: #FFD700;
  color: #333;
  border-color: #FFD700;
  box-shadow: 0 0 20px rgba(255,215,0,0.5);
}

.tab-btn:hover {
  transform: translateY(-2px);
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
  animation: fadeIn 0.3s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.form-group {
  margin-bottom: 16px;
}

label {
  display: block;
  color: rgba(255,255,255,0.8);
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

input {
  width: 100%;
  padding: 12px;
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 8px;
  background: rgba(255,255,255,0.1);
  color: white;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  transition: all 0.3s;
}

input:focus {
  outline: none;
  border-color: #FFD700;
  box-shadow: 0 0 10px rgba(255,215,0,0.3);
  background: rgba(255,255,255,0.15);
}

input::placeholder {
  color: rgba(255,255,255,0.4);
}

.strength-bar {
  height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  margin-top: 6px;
  overflow: hidden;
}

.strength-fill {
  height: 100%;
  width: 0%;
  transition: all 0.3s;
  border-radius: 2px;
}

.strength-weak { background: #FF6347; }
.strength-medium { background: #FFA500; }
.strength-strong { background: #00AA00; }

.submit-btn {
  width: 100%;
  padding: 14px;
  background: #FFD700;
  color: #333;
  border: 3px solid #8B6914;
  border-radius: 10px;
  font-family: 'Bangers', cursive;
  font-size: 18px;
  letter-spacing: 2px;
  cursor: pointer;
  font-weight: 900;
  box-shadow: 0 6px 0 #8B6914;
  transition: transform 0.15s;
  margin-top: 16px;
}

.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 0 #8B6914;
}

.message {
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 16px;
  font-weight: 800;
  text-align: center;
  display: none;
}

.message.show {
  display: block;
  animation: slideIn 0.3s ease-out;
}

@keyframes slideIn {
  from { transform: translateY(-10px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.message.success {
  background: rgba(0,170,0,0.3);
  color: #00AA00;
  border: 2px solid #00AA00;
}

.message.error {
  background: rgba(255,99,71,0.3);
  color: #FF6347;
  border: 2px solid #FF6347;
}

.back-link {
  text-align: center;
  margin-top: 20px;
}

.back-link a {
  color: rgba(255,255,255,0.6);
  text-decoration: none;
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: color 0.3s;
}

.back-link a:hover {
  color: #FFD700;
}

.toggle-text {
  text-align: center;
  margin-top: 16px;
  color: rgba(255,255,255,0.6);
  font-size: 13px;
  font-weight: 800;
}

.toggle-text a {
  color: #FFD700;
  text-decoration: none;
  cursor: pointer;
}

.toggle-text a:hover {
  text-decoration: underline;
}
</style>
</head>
<body>

<div class="road"></div>
<div class="logo-watermark">⛽</div>

<div class="ad-banner">
  <div class="ad-title">🏪 TEDDY'S</div>
  <div class="ad-info">
    Open 24/7<br>
    Fuel • Snacks<br>
    Drinks • Gas<br>
    Service
  </div>
  <div class="ad-phone">📞 (832) 224-5918</div>
</div>

<div class="container">
  <div class="title">🔐 LOGIN</div>
  <div class="subtitle">Teddy's Gas Station</div>

  <div class="tabs">
    <button class="tab-btn active" id="empBtn" onclick="switchToEmployee()">👷 EMPLOYEE</button>
    <button class="tab-btn" id="custBtn" onclick="switchToCustomer()">🛒 CUSTOMER</button>
  </div>

  <!-- EMPLOYEE TAB -->
  <div class="tab-content active" id="employeeTab">
    <div id="empMessage" class="message"></div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="empUsername" placeholder="Enter username">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="empPassword" placeholder="Enter password">
    </div>

    <button class="submit-btn" onclick="employeeSignIn()">SIGN IN</button>
  </div>

  <!-- CUSTOMER TAB -->
  <div class="tab-content" id="customerTab">
    <div id="custMessage" class="message"></div>

    <!-- SIGN IN FORM -->
    <div id="signInForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="custEmail" placeholder="your@email.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="custPassword" placeholder="Enter password">
      </div>

      <button class="submit-btn" onclick="customerSignIn()">SIGN IN</button>

      <div class="toggle-text">
        Don't have an account? <a onclick="showSignUp()">CREATE ONE</a>
      </div>
    </div>

    <!-- SIGN UP FORM (hidden) -->
    <div id="signUpForm" style="display: none;">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="your@email.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Min 8 characters">
        <div class="strength-bar">
          <div class="strength-fill" id="strengthFill"></div>
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Re-enter password">
      </div>

      <button class="submit-btn" onclick="customerSignUp()">CREATE ACCOUNT</button>

      <div class="toggle-text">
        Already have an account? <a onclick="showSignIn()">SIGN IN</a>
      </div>
    </div>
  </div>

  <div class="back-link">
    <a href="index.html">← Back to Teddy's Website</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.47.0"></script>

<script>
// Initialize Supabase with proper error handling
const SUPABASE_URL = 'https://mzfdgzwdnvntefgnlnoi.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16ZmRnendkbnZudGVmZ25sbm9pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzODAxMzYsImV4cCI6MjA5MTk1NjEzNn0.IuYLD1R4Wr8bAOvVSIO2KdqXPYVw2f77bxMUty7pQ7c';

let supabase = null;

// Load Supabase when ready
setTimeout(() => {
  if(window.supabase && window.supabase.createClient) {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  }
}, 500);

// TAB SWITCHING
function switchToEmployee() {
  document.getElementById('empBtn').classList.add('active');
  document.getElementById('custBtn').classList.remove('active');
  document.getElementById('employeeTab').classList.add('active');
  document.getElementById('customerTab').classList.remove('active');
}

function switchToCustomer() {
  document.getElementById('custBtn').classList.add('active');
  document.getElementById('empBtn').classList.remove('active');
  document.getElementById('customerTab').classList.add('active');
  document.getElementById('employeeTab').classList.remove('active');
}

function showSignUp() {
  document.getElementById('signInForm').style.display = 'none';
  document.getElementById('signUpForm').style.display = 'block';
  clearMessage('custMessage');
}

function showSignIn() {
  document.getElementById('signUpForm').style.display = 'none';
  document.getElementById('signInForm').style.display = 'block';
  clearMessage('custMessage');
}

// MESSAGES
function showMessage(msgId, text, type) {
  var msg = document.getElementById(msgId);
  msg.textContent = text;
  msg.className = 'message show ' + type;
}

function clearMessage(msgId) {
  var msg = document.getElementById(msgId);
  msg.className = 'message';
}

// PASSWORD STRENGTH
document.getElementById('signupPassword')?.addEventListener('input', function() {
  var strength = 0;
  var val = this.value;
  if(val.length >= 8) strength++;
  if(/[A-Z]/.test(val)) strength++;
  if(/[0-9]/.test(val)) strength++;
  if(/[^a-zA-Z0-9]/.test(val)) strength++;
  
  var fill = document.getElementById('strengthFill');
  var width = (strength / 4) * 100;
  fill.style.width = width + '%';
  
  if(strength <= 1) fill.className = 'strength-fill strength-weak';
  else if(strength <= 2) fill.className = 'strength-fill strength-medium';
  else fill.className = 'strength-fill strength-strong';
});

// EMPLOYEE SIGN IN
async function employeeSignIn() {
  var username = document.getElementById('empUsername').value;
  var password = document.getElementById('empPassword').value;
  
  if(!username || !password) {
    showMessage('empMessage', '⚠️ Enter username & password', 'error');
    return;
  }
  
  if(!supabase) {
    showMessage('empMessage', '⚠️ Loading... try again in a moment', 'error');
    return;
  }
  
  try {
    var { data, error } = await supabase
      .from('employees')
      .select('*')
      .eq('username', username)
      .eq('password', password)
      .single();
    
    if(error || !data) {
      showMessage('empMessage', '❌ Username or password incorrect', 'error');
      return;
    }
    
    localStorage.setItem('teddys_loggedin', 'employee');
    localStorage.setItem('employee_name', data.full_name);
    showMessage('empMessage', '✅ Logging in...', 'success');
    setTimeout(() => window.location.href = 'index.html', 1000);
    
  } catch(e) {
    showMessage('empMessage', '❌ Error: ' + e.message, 'error');
  }
}

// CUSTOMER SIGN IN
async function customerSignIn() {
  var email = document.getElementById('custEmail').value;
  var password = document.getElementById('custPassword').value;
  
  if(!email || !password) {
    showMessage('custMessage', '⚠️ Enter email & password', 'error');
    return;
  }
  
  if(!supabase) {
    showMessage('custMessage', '⚠️ Loading... try again in a moment', 'error');
    return;
  }
  
  try {
    var { data, error } = await supabase.auth.signInWithPassword({
      email: email,
      password: password
    });
    
    if(error) {
      showMessage('custMessage', '❌ ' + error.message, 'error');
      return;
    }
    
    localStorage.setItem('teddys_loggedin', 'customer');
    showMessage('custMessage', '✅ Logging in...', 'success');
    setTimeout(() => window.location.href = 'index.html', 1000);
    
  } catch(e) {
    showMessage('custMessage', '❌ Error: ' + e.message, 'error');
  }
}

// CUSTOMER SIGN UP
async function customerSignUp() {
  var email = document.getElementById('signupEmail').value;
  var password = document.getElementById('signupPassword').value;
  var confirm = document.getElementById('confirmPassword').value;
  
  if(!email || !password || !confirm) {
    showMessage('custMessage', '⚠️ Fill all fields', 'error');
    return;
  }
  
  if(password !== confirm) {
    showMessage('custMessage', '⚠️ Passwords don\'t match', 'error');
    return;
  }
  
  if(password.length < 8) {
    showMessage('custMessage', '⚠️ Password must be 8+ characters', 'error');
    return;
  }
  
  if(!email.includes('@')) {
    showMessage('custMessage', '⚠️ Invalid email address', 'error');
    return;
  }
  
  if(!supabase) {
    showMessage('custMessage', '⚠️ Loading... try again in a moment', 'error');
    return;
  }
  
  try {
    // First try to sign up
    var { data: signupData, error: signupError } = await supabase.auth.signUp({
      email: email,
      password: password
    });
    
    if(signupError) {
      if(signupError.message && signupError.message.includes('already registered')) {
        showMessage('custMessage', '❌ Email already exists! Try signing in.', 'error');
      } else {
        showMessage('custMessage', '❌ ' + signupError.message, 'error');
      }
      return;
    }
    
    // Now automatically sign them in
    var { data: signInData, error: signInError } = await supabase.auth.signInWithPassword({
      email: email,
      password: password
    });
    
    if(signInError) {
      showMessage('custMessage', '✅ Account created! Please sign in now.', 'success');
      setTimeout(() => showSignIn(), 2000);
      return;
    }
    
    // Success - logged in!
    localStorage.setItem('teddys_loggedin', 'customer');
    showMessage('custMessage', '✅ Account created & signed in!', 'success');
    setTimeout(() => window.location.href = 'index.html', 1000);
    
  } catch(e) {
    showMessage('custMessage', '❌ Error: ' + e.message, 'error');
  }
}
</script>
</body>
</html>
